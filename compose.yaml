name: ${COMPOSE_PROJECT_NAME:-jarvis}

services:
  caddy:
    image: ${CADDY_IMAGE:?Set an owner-approved full digest}
    ports: ["127.0.0.1:${JARVIS_HTTP_PORT:-18080}:80"]
    volumes:
      - ./config/caddy:/etc/caddy:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [edge, control]
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/healthz"]

  jarvis-api:
    image: ${JARVIS_API_IMAGE:?Set an owner-approved full digest}
    environment:
      POSTGRES_HOST: postgres
      MQTT_HOST: mqtt
    secrets: [postgres_password]
    volumes: ["${JARVIS_DATA_ROOT:?Set an owner-approved external data root}:/var/lib/jarvis"]
    networks: [control]
    restart: on-failure:3
    depends_on:
      postgres: {condition: service_healthy}
      mqtt: {condition: service_started}

  postgres:
    image: ${POSTGRES_IMAGE:?Set an owner-approved full digest}
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_DB: jarvis
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      PGDATA: /var/lib/postgresql/data/pgdata
    secrets: [postgres_password]
    volumes: [postgres-data:/var/lib/postgresql/data]
    networks: [control]
    restart: on-failure:3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mqtt:
    image: ${MQTT_IMAGE:?Set an owner-approved full digest}
    volumes:
      - ./config/mosquitto:/mosquitto/config:ro
      - mqtt-data:/mosquitto/data
    networks: [control]
    restart: on-failure:3

  hermes:
    image: ${HERMES_IMAGE:?Set an owner-approved full digest}
    command: ["gateway", "run"]
    environment: ["API_SERVER_ENABLED=false"]
    volumes: [hermes-data:/opt/data]
    networks: [control]
    restart: on-failure:3
    healthcheck: {disable: true}

secrets:
  postgres_password:
    file: ${JARVIS_SECRETS_DIR:?Set an owner-approved secrets directory}/postgres_password

networks:
  edge: {internal: true}
  control: {internal: true}

volumes:
  caddy-data: {}
  caddy-config: {}
  postgres-data: {}
  mqtt-data: {}
  hermes-data: {}
